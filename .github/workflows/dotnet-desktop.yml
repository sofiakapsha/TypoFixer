name: build and test

on:
  push:
    branches: 
      - main
      - dev
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          
      - name: Restore dependencies
        working-directory: TypoFixer
        run: dotnet restore TypoFixer.sln
        
      - name: Build
        working-directory: TypoFixer
        run: dotnet build --no-restore

      - name: Run Tests
        working-directory: TypoFixer
        run: dotnet test
